<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dōbutsu Shōgi tablebase explorer</title>
<style>
  :root {
    --ink:#1f2328; --muted:#6b7280;
    --win:#2e7d32; --winbg:#eaf4ea; --loss:#c0392b; --lossbg:#fbecea;
    --draw:#6b7280; --drawbg:#f1f2f4; --accent:#d98a2b;
    --sente:#fbf5e6; --sente-line:#6f5d33; --gote:#373d47; --gote-line:#20252d;
  }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif; color:var(--ink);
         margin:24px auto; max-width:880px; padding:0 16px; line-height:1.5; }
  h1 { font-size:1.3rem; margin:0 0 2px; }
  .sub { color:var(--muted); font-size:.85rem; margin-bottom:16px; }
  .controls { margin:0 0 14px; }
  button { font:inherit; padding:5px 12px; margin-right:8px; border:1px solid #d4d4d8;
           background:#fff; border-radius:7px; cursor:pointer; }
  button:hover { background:#f3f3f3; }
  .wrap { display:flex; gap:26px; flex-wrap:wrap; align-items:flex-start; }
  .left { flex:0 0 auto; width:344px; }

  .tray { display:flex; align-items:center; gap:7px; min-height:46px; padding:5px 10px;
          border:1.5px solid #e6e2d6; border-radius:10px; background:#f8f5ec; transition:border-color .15s,box-shadow .15s; }
  .tray + .board-wrap { margin-top:8px; }
  .board-wrap + .tray { margin-top:8px; }
  .tray.active { border-color:var(--accent); box-shadow:0 0 0 3px rgba(217,138,43,.16); }
  .traylbl { font-size:.72rem; font-weight:700; letter-spacing:.03em; text-transform:uppercase;
             color:#9a8a62; margin-right:4px; }
  .chip { display:inline-flex; align-items:center; gap:2px; padding:3px 7px 3px 4px;
          border-radius:8px; border:1.5px solid var(--sente-line); background:var(--sente);
          cursor:grab; user-select:none; }
  .chip.gote { background:var(--gote); border-color:var(--gote-line); color:#eef2f8; }
  .chip.sel { box-shadow:0 0 0 3px rgba(217,138,43,.55); }
  .chip img { width:24px; height:24px; pointer-events:none; -webkit-user-drag:none; }
  .chip .cnt { font-size:.78rem; font-weight:700; }
  .tray .empty { color:#b9b3a4; font-size:.9rem; }

  #board { display:block; width:344px; height:auto; touch-action:none; }
  #board image, #board .pc { pointer-events:none; }
  #board.grab { cursor:grab; }
  #board.grab:active { cursor:grabbing; }

  .panel { flex:1 1 280px; min-width:264px; border:1px solid #e7e7ea; border-radius:12px;
           overflow:hidden; box-shadow:0 1px 3px rgba(0,0,0,.05); }
  .verdict { padding:13px 16px; font-weight:700; font-size:1.06rem; display:flex;
             align-items:baseline; gap:8px; border-left:5px solid var(--draw); }
  .verdict small { font-weight:500; color:var(--muted); font-size:.8rem; }
  .verdict.win  { background:var(--winbg);  border-left-color:var(--win); }
  .verdict.loss { background:var(--lossbg); border-left-color:var(--loss); }
  .verdict.draw { background:var(--drawbg); border-left-color:var(--draw); }
  .moves { max-height:472px; overflow-y:auto; }
  .grouphdr { font-size:.72rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
              color:#fff; padding:4px 16px; }
  .grouphdr.win  { background:var(--win); }
  .grouphdr.loss { background:var(--loss); }
  .grouphdr.draw { background:var(--draw); }
  .move { display:flex; align-items:center; justify-content:space-between; gap:10px;
          padding:7px 16px; border-bottom:1px solid #f1f1f3; cursor:pointer; font-size:.95rem; }
  .move:hover { background:#faf7ef; }
  .move.dead { cursor:default; }
  .move .mv { font-family:ui-monospace,Menlo,monospace; }
  .badge { font-size:.78rem; font-weight:700; padding:2px 9px; border-radius:11px;
           white-space:nowrap; min-width:34px; text-align:center; }
  .badge.win  { background:var(--win);  color:#fff; }
  .badge.loss { background:var(--loss); color:#fff; }
  .badge.draw { background:#d7dade; color:#333; }
  .note { color:#9aa0a6; font-size:.78rem; margin-top:14px; }
</style>
</head>
<body>
  <h1>Dōbutsu Shōgi tablebase explorer</h1>
  <div class="sub">Every legal move with its result under perfect play. Drag a piece or click a move to follow it.</div>
  <div class="controls">
    <button id="reset">↺ Reset</button>
    <button id="back">← Back</button>
  </div>
  <div class="wrap">
    <div class="left">
      <div class="tray" id="trayTop"></div>
      <div class="board-wrap"><svg id="board" viewBox="0 0 326 422"></svg></div>
      <div class="tray" id="trayBottom"></div>
    </div>
    <div class="panel">
      <div class="verdict" id="verdict">…</div>
      <div class="moves" id="moves"></div>
    </div>
  </div>
  <div class="note">Backed by our own complete endgame tablebase. The dots on each piece show how it moves.
    Animal glyphs: Twemoji (CC-BY 4.0).</div>

<script>
const INITIAL = "S/gle/-c-/-C-/ELG/-";
const CELL = 96, MX = 26, MY = 24, SVGW = 326, SVGH = 422;
const PIECE = {C:"chick", G:"giraffe", E:"elephant", L:"lion", R:"hen"};
const FILES = ["a","b","c"];
const DIRS = {N:[0,-1], S:[0,1], E:[1,0], W:[-1,0], NE:[1,-1], NW:[-1,-1], SE:[1,1], SW:[-1,1]};
// step directions in a piece's own frame (N = toward the opponent's side)
const MOVES = {
  L:["N","NE","E","SE","S","SW","W","NW"], G:["N","E","S","W"],
  E:["NE","SE","SW","NW"], C:["N"], R:["N","NE","NW","E","W","S"]};

let history = [INITIAL];
let curParsed = null;          // parsed current position
let byBoard = {}, byDrop = {}; // drag-target key -> move
let selected = null;           // sticky selection: {kind:'board',from} | {kind:'hand',piece}
let targets = [];              // legal destinations of `selected`
let press = null;              // transient pointer state during a press: {intent,x,y,moved}
let hoverTo = null;            // square under the pointer (during a drag)
let hoverMove = null;          // move previewed from the list: {from:{col,row}|null, to, piece}
let lastMove = null;           // {from:{col,row}|null, to:{col,row}}

function parsePos(pos) {
  const parts = pos.split("/");
  const cells = [], sente = [], gote = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 3; c++) {
      const ch = parts[1 + r][c];
      if (ch === "-") continue;
      const owner = ch === ch.toUpperCase() ? "sente" : "gote";
      cells.push({ col: c, row: r, piece: ch.toUpperCase(), owner });
    }
  const hand = parts[5] || "-";
  if (hand !== "-") for (const ch of hand)
    (ch === ch.toUpperCase() ? sente : gote).push(ch.toUpperCase());
  return { side: parts[0], cells, sente, gote };
}

function destOf(mv) {
  const m = mv.match(/([abc])([1-4])$/);
  return m ? { col: FILES.indexOf(m[1]), row: parseInt(m[2], 10) - 1 } : null;
}
function moveSquares(mv) {
  const piece = mv[0];
  if (mv[1] === "*") {
    const t = mv.slice(2, 4);
    return { from: null, piece, to: { col: FILES.indexOf(t[0]), row: +t[1] - 1 } };
  }
  const f = mv.slice(1, 3);
  const core = mv.endsWith("+") ? mv.slice(0, -1) : mv;
  const t = core.slice(-2);
  return { from: { col: FILES.indexOf(f[0]), row: +f[1] - 1 }, piece,
           to: { col: FILES.indexOf(t[0]), row: +t[1] - 1 } };
}

function defs() {
  return `<defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ddf1fa"/><stop offset="1" stop-color="#cde7f3"/></linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9ecba"/><stop offset="1" stop-color="#c4dd9d"/></linearGradient>
    <filter id="tsh" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.4" flood-color="#000" flood-opacity="0.32"/></filter>
    <filter id="bsh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.20"/></filter>
    <clipPath id="bclip"><rect x="${MX}" y="${MY}" width="${3*CELL}" height="${4*CELL}" rx="9"/></clipPath>
  </defs>`;
}

function cloud(cx, cy, s) {
  return `<g fill="#fff" opacity="0.95">
    <ellipse cx="${cx}" cy="${cy}" rx="${26*s}" ry="${15*s}"/>
    <ellipse cx="${cx-22*s}" cy="${cy+5*s}" rx="${17*s}" ry="${11*s}"/>
    <ellipse cx="${cx+22*s}" cy="${cy+5*s}" rx="${18*s}" ry="${12*s}"/>
    <ellipse cx="${cx+2*s}" cy="${cy-8*s}" rx="${13*s}" ry="${9*s}"/></g>`;
}

function pieceTile(cx, cy, letter, owner, ghost) {
  const half = CELL * 0.40, glyph = CELL * 0.50, up = owner === "sente";
  const fill = up ? "var(--sente)" : "var(--gote)";
  const stroke = up ? "var(--sente-line)" : "var(--gote-line)";
  const dotc = up ? "#7a4a2a" : "#e9eef6";
  let p = ghost ? `<g opacity="0.5">` : ``;
  p += `<rect class="pc" x="${(cx-half).toFixed(1)}" y="${(cy-half).toFixed(1)}" width="${(2*half).toFixed(1)}" `
     + `height="${(2*half).toFixed(1)}" rx="${(half*0.22).toFixed(1)}" fill="${fill}" stroke="${stroke}" `
     + `stroke-width="2"${ghost ? ` stroke-dasharray="5 3"` : ` filter="url(#tsh)"`}/>`;
  const sign = up ? 1 : -1, rr = half * 0.80, dr = half * 0.10;
  for (const d of (MOVES[letter] || [])) {
    const [ux, uy] = DIRS[d];
    p += `<circle class="pc" cx="${(cx+sign*ux*rr).toFixed(1)}" cy="${(cy+sign*uy*rr).toFixed(1)}" r="${dr.toFixed(1)}" fill="${dotc}"/>`;
  }
  p += `<image href="/emoji/${PIECE[letter]}.svg" x="${(cx-glyph/2).toFixed(1)}" y="${(cy-glyph/2).toFixed(1)}" width="${glyph.toFixed(1)}" height="${glyph.toFixed(1)}"/>`;
  return p + (ghost ? `</g>` : ``);
}

// short arrow from one square's centre to an adjacent one (every move is one step)
function arrow(from, to) {
  const c = (col, row) => [MX + col*CELL + CELL/2, MY + row*CELL + CELL/2];
  const [x1, y1] = c(from.col, from.row), [x2, y2] = c(to.col, to.row);
  const dx = x2-x1, dy = y2-y1, len = Math.hypot(dx, dy) || 1, ux = dx/len, uy = dy/len, px = -uy, py = ux;
  const w = CELL*0.13, head = CELL*0.34, hw = CELL*0.21;
  const sx = x1 + ux*CELL*0.24, sy = y1 + uy*CELL*0.24;        // start just outside the source centre
  const tipx = x2 - ux*CELL*0.08, tipy = y2 - uy*CELL*0.08;    // tip just short of the dest centre
  const bx = tipx - ux*head, by = tipy - uy*head;             // arrowhead base
  const col = "#e08220";
  return `<g opacity="0.9">`
    + `<line x1="${sx.toFixed(1)}" y1="${sy.toFixed(1)}" x2="${bx.toFixed(1)}" y2="${by.toFixed(1)}" stroke="${col}" stroke-width="${w.toFixed(1)}" stroke-linecap="round"/>`
    + `<polygon points="${tipx.toFixed(1)},${tipy.toFixed(1)} ${(bx+px*hw).toFixed(1)},${(by+py*hw).toFixed(1)} ${(bx-px*hw).toFixed(1)},${(by-py*hw).toFixed(1)}" fill="${col}"/></g>`;
}

function renderBoard(parsed) {
  const occ = {};
  parsed.cells.forEach(c => occ[c.row * 3 + c.col] = c);
  const cx = c => MX + c * CELL + CELL / 2, cy = r => MY + r * CELL + CELL / 2;
  let s = defs();

  // lifted board card + field zones (clipped to rounded board)
  s += `<rect x="${MX}" y="${MY}" width="${3*CELL}" height="${4*CELL}" rx="9" fill="#fff" filter="url(#bsh)"/>`;
  s += `<g clip-path="url(#bclip)">`;
  s += `<rect x="${MX}" y="${MY}" width="${3*CELL}" height="${CELL}" fill="url(#sky)"/>`;            // gote back rank: sky
  s += `<rect x="${MX}" y="${MY+CELL}" width="${3*CELL}" height="${2*CELL}" fill="#f1e6c6"/>`;         // midfield: savanna
  s += `<rect x="${MX}" y="${MY+3*CELL}" width="${3*CELL}" height="${CELL}" fill="url(#grass)"/>`;     // sente back rank: grass
  s += cloud(MX + CELL*0.74, MY + CELL*0.38, 0.92) + cloud(MX + CELL*2.28, MY + CELL*0.62, 1.08);
  // soft mountains on the home rank, then a foreground hill
  const gy = MY + 3*CELL;
  s += `<g fill="#a6c97c" opacity="0.7">`
     + `<path d="M${MX+CELL*0.35} ${MY+4*CELL} L${MX+CELL*1.05} ${gy+22} L${MX+CELL*1.75} ${MY+4*CELL} Z"/>`
     + `<path d="M${MX+CELL*1.55} ${MY+4*CELL} L${MX+CELL*2.3} ${gy+10} L${MX+3*CELL+6} ${MY+4*CELL} Z"/></g>`;
  s += `<path d="M${MX} ${MY+4*CELL} L${MX} ${gy+46} `
     + `Q${MX+CELL*1.0} ${gy+20} ${MX+CELL*1.8} ${gy+40} `
     + `Q${MX+CELL*2.5} ${gy+56} ${MX+3*CELL} ${gy+34} `
     + `L${MX+3*CELL} ${MY+4*CELL} Z" fill="#bcdb92" opacity="0.9"/>`;
  s += `</g>`;

  // grid + frame
  for (let i = 1; i < 3; i++)
    s += `<line x1="${MX+i*CELL}" y1="${MY}" x2="${MX+i*CELL}" y2="${MY+4*CELL}" stroke="#00000018" stroke-width="1"/>`;
  for (let i = 1; i < 4; i++)
    s += `<line x1="${MX}" y1="${MY+i*CELL}" x2="${MX+3*CELL}" y2="${MY+i*CELL}" stroke="#00000018" stroke-width="1"/>`;
  s += `<rect x="${MX}" y="${MY}" width="${3*CELL}" height="${4*CELL}" rx="9" fill="none" stroke="#9c8856" stroke-width="3"/>`;

  // coordinates
  for (let f = 0; f < 3; f++)
    s += `<text x="${cx(f)}" y="${MY-8}" font-size="13" text-anchor="middle" fill="#9a8a62" font-weight="700">${FILES[f].toUpperCase()}</text>`;
  for (let r = 0; r < 4; r++)
    s += `<text x="${MX-12}" y="${cy(r)+5}" font-size="13" text-anchor="middle" fill="#9a8a62" font-weight="700">${r+1}</text>`;

  // last-move highlight
  if (lastMove) for (const sq of [lastMove.from, lastMove.to]) if (sq)
    s += `<rect x="${MX+sq.col*CELL+2}" y="${MY+sq.row*CELL+2}" width="${CELL-4}" height="${CELL-4}" fill="#f6d873" opacity="0.5"/>`;

  // selected-piece highlight
  if (selected && selected.kind === "board")
    s += `<rect x="${MX+selected.from.col*CELL+2}" y="${MY+selected.from.row*CELL+2}" width="${CELL-4}" height="${CELL-4}" fill="#d98a2b" opacity="0.30"/>`;

  // legal-destination markers
  for (const t of targets) {
    if (occ[t.row*3 + t.col])
      s += `<circle cx="${cx(t.col)}" cy="${cy(t.row)}" r="${CELL*0.46}" fill="none" stroke="#2b8a8a" stroke-width="4" opacity="0.7"/>`;
    else
      s += `<circle cx="${cx(t.col)}" cy="${cy(t.row)}" r="${CELL*0.15}" fill="#2b8a8a" opacity="0.45"/>`;
  }

  // hover ring (move preview / drag target under pointer)
  if (hoverTo)
    s += `<rect x="${MX+hoverTo.col*CELL+1.5}" y="${MY+hoverTo.row*CELL+1.5}" width="${CELL-3}" height="${CELL-3}" rx="4" fill="none" stroke="${"var(--accent)"}" stroke-width="3"/>`;

  // pieces
  for (const p of parsed.cells) s += pieceTile(cx(p.col), cy(p.row), p.piece, p.owner);

  // hovered-move preview: an arrow for a board move, a ghost piece for a drop
  if (hoverMove) {
    const to = hoverMove.to;
    if (hoverMove.from) {
      s += `<rect x="${MX+to.col*CELL+1.5}" y="${MY+to.row*CELL+1.5}" width="${CELL-3}" height="${CELL-3}" rx="4" fill="none" stroke="#e08220" stroke-width="3" opacity="0.85"/>`;
      s += arrow(hoverMove.from, to);
    } else {
      s += pieceTile(cx(to.col), cy(to.row), hoverMove.piece, parsed.side === "S" ? "sente" : "gote", true);
    }
  }

  document.getElementById("board").innerHTML = s;
  document.getElementById("board").classList.toggle("grab", parsed.cells.length > 0);
  renderHands(parsed);
}

function renderHands(parsed) {
  const chips = (arr, owner) => {
    const lbl = `<span class="traylbl">${owner === "sente" ? "First player" : "Second player"}</span>`;
    if (!arr.length) return lbl + `<span class="empty">empty hand</span>`;
    const counts = {}; arr.forEach(p => counts[p] = (counts[p] || 0) + 1);
    return lbl + Object.entries(counts).map(([p, n]) => {
      const sel = selected && selected.kind === "hand" && selected.piece === p ? " sel" : "";
      return `<span class="chip ${owner}${sel}" data-piece="${p}"><img src="/emoji/${PIECE[p]}.svg" draggable="false">`
        + (n > 1 ? `<span class="cnt">×${n}</span>` : ``) + `</span>`;
    }).join("");
  };
  const top = document.getElementById("trayTop"), bot = document.getElementById("trayBottom");
  top.innerHTML = chips(parsed.gote, "gote");
  bot.innerHTML = chips(parsed.sente, "sente");
  top.classList.toggle("active", parsed.side === "G");
  bot.classList.toggle("active", parsed.side === "S");
}

function verdict(data) {
  const who = data.side === "S" ? "First player" : "Second player";
  const v = data.value, el = document.getElementById("verdict");
  el.className = "verdict " + v.result;
  if (v.result === "win") el.innerHTML = `${who} wins <small>in ${v.dtm} plies</small>`;
  else if (v.result === "loss") el.innerHTML = `${who} loses <small>in ${v.dtm} plies</small>`;
  else el.innerHTML = `Drawn <small>with perfect play</small>`;
}

function group(moves, kind) {
  let g = moves.filter(m => m.result === kind);
  if (kind === "win") g.sort((a, b) => a.dtm - b.dtm);   // fastest win first
  if (kind === "loss") g.sort((a, b) => b.dtm - a.dtm);  // slowest loss = best defense first
  return g;
}

function render(data) {
  const parsed = parsePos(data.pos);
  curParsed = parsed;
  byBoard = {}; byDrop = {};
  for (const m of data.moves) {
    const sq = moveSquares(m.move);
    if (sq.from === null) byDrop[`${sq.piece}-${sq.to.col}${sq.to.row}`] = m;
    else byBoard[`${sq.from.col}${sq.from.row}-${sq.to.col}${sq.to.row}`] = m;
  }
  renderBoard(parsed);
  verdict(data);
  const box = document.getElementById("moves");
  box.innerHTML = "";
  for (const [kind, label] of [["win","Winning"],["draw","Drawing"],["loss","Losing"]]) {
    const moves = group(data.moves, kind);
    if (!moves.length) continue;
    const h = document.createElement("div");
    h.className = "grouphdr " + kind;
    h.textContent = `${label} · ${moves.length}`;
    box.appendChild(h);
    for (const m of moves) {
      const row = document.createElement("div");
      row.className = "move" + (m.to ? "" : " dead");
      const badge = kind === "draw" ? "draw" : (m.to ? m.dtm : `#${m.dtm}`);
      row.innerHTML = `<span class="mv">${m.move}</span><span class="badge ${kind}">${badge}</span>`;
      const sq = moveSquares(m.move);
      row.onmouseenter = () => { hoverMove = sq; renderBoard(parsed); };
      row.onmouseleave = () => { hoverMove = null; renderBoard(parsed); };
      if (m.to) row.onclick = () => { lastMove = { from: sq.from, to: sq.to }; go(m.to, true); };
      else row.title = "captures the lion / completes a Try — game over";
      box.appendChild(row);
    }
  }
}

async function go(pos, push) {
  const data = await (await fetch("/api?pos=" + encodeURIComponent(pos))).json();
  if (data.error) { alert(data.error); return; }
  if (push) history.push(pos);
  hoverTo = null; hoverMove = null; clearSelection();
  render(data);
}

// ---- selection + drag: click a piece to keep its moves shown; click a target to move ----
function squareFromEvent(e) {
  const r = document.getElementById("board").getBoundingClientRect();
  const x = (e.clientX - r.left) * (SVGW / r.width);
  const y = (e.clientY - r.top) * (SVGH / r.height);
  const col = Math.floor((x - MX) / CELL), row = Math.floor((y - MY) / CELL);
  return (col < 0 || col > 2 || row < 0 || row > 3) ? null : { col, row };
}
function targetsFor(sel) {
  const map = sel.kind === "board" ? byBoard : byDrop;
  const prefix = sel.kind === "board" ? `${sel.from.col}${sel.from.row}-` : `${sel.piece}-`;
  const out = [];
  for (const k in map) if (k.startsWith(prefix)) { const t = k.slice(prefix.length); out.push({ col: +t[0], row: +t[1] }); }
  return out;
}
function pieceAt(sq) { return curParsed && curParsed.cells.find(c => c.col === sq.col && c.row === sq.row); }
function isTarget(sel, sq) {
  if (!sel || !sq) return null;
  const key = sel.kind === "board" ? `${sel.from.col}${sel.from.row}-${sq.col}${sq.row}` : `${sel.piece}-${sq.col}${sq.row}`;
  return (sel.kind === "board" ? byBoard : byDrop)[key] || null;
}
function clearSelection() { selected = null; targets = []; }
function selectThing(sel) { const t = targetsFor(sel); if (t.length) { selected = sel; targets = t; } else clearSelection(); }
function sameSel(a, b) {
  return a && b && a.kind === b.kind &&
    (a.kind === "board" ? (a.from.col === b.from.col && a.from.row === b.from.row) : a.piece === b.piece);
}
function execMove(m) {
  const sq = moveSquares(m.move);
  clearSelection(); hoverTo = null; press = null;
  if (m.to) { lastMove = { from: sq.from, to: sq.to }; go(m.to, true); }
  else { if (curParsed) renderBoard(curParsed); alert("That move wins — the lion is captured (or a Try is completed)."); }
}

document.addEventListener("pointerdown", e => {
  const board = document.getElementById("board");
  let intent = "clear";
  if (board.contains(e.target)) {
    const sq = squareFromEvent(e);
    const m = isTarget(selected, sq);
    if (m) { e.preventDefault(); execMove(m); return; }        // click a legal target -> move
    if (sq && pieceAt(sq)) {
      const sel = { kind: "board", from: sq };
      if (sameSel(selected, sel)) clearSelection();            // click the selected piece -> deselect
      else { selectThing(sel); if (selected) intent = "select"; }
    } else clearSelection();                                   // click empty square -> deselect
    e.preventDefault();
  } else if (e.target.closest(".tray")) {
    const chip = e.target.closest(".chip");
    if (chip && chip.dataset.piece) {
      const sel = { kind: "hand", piece: chip.dataset.piece };
      if (sameSel(selected, sel)) clearSelection();
      else { selectThing(sel); if (selected) intent = "select"; }
      e.preventDefault();
    } else clearSelection();
  } else clearSelection();                                     // click anywhere else -> deselect
  press = { intent, x: e.clientX, y: e.clientY, moved: false };
  if (curParsed) renderBoard(curParsed);
});
window.addEventListener("pointermove", e => {
  if (!press || press.intent !== "select") return;
  if (!press.moved) { if (Math.hypot(e.clientX - press.x, e.clientY - press.y) < 6) return; press.moved = true; }
  const sq = squareFromEvent(e);
  if ((hoverTo && sq && hoverTo.col === sq.col && hoverTo.row === sq.row) || (!hoverTo && !sq)) return;
  hoverTo = sq;
  if (curParsed) renderBoard(curParsed);
});
window.addEventListener("pointerup", e => {
  if (!press) return;
  if (press.intent === "select" && press.moved) {             // drag-release onto a target -> move
    const m = isTarget(selected, squareFromEvent(e));
    if (m) { execMove(m); return; }
  }
  press = null; hoverTo = null;                               // tap (stays selected) or drag-miss
  if (curParsed) renderBoard(curParsed);
});
window.addEventListener("pointercancel", () => { press = null; hoverTo = null; if (curParsed) renderBoard(curParsed); });

document.getElementById("reset").onclick = () => { history = [INITIAL]; lastMove = null; go(INITIAL, false); };
document.getElementById("back").onclick = () => {
  if (history.length > 1) { history.pop(); lastMove = null; go(history[history.length - 1], false); }
};
go(INITIAL, false);
</script>
</body>
</html>
