<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dōbutsu Shōgi tablebase explorer</title>
<style>
  :root {
    --ivory:#fbf5e6; --slate:#373d47; --board:#f3e7c6; --line:#cbb98a;
    --win:#2e7d32; --winbg:#eaf4ea; --loss:#c0392b; --lossbg:#fbecea;
    --draw:#6b7280; --drawbg:#f1f2f4; --ink:#1a1a1a; --muted:#6b7280;
  }
  * { box-sizing:border-box; }
  body { font-family:-apple-system,Segoe UI,Helvetica,Arial,sans-serif; color:var(--ink);
         margin:24px auto; max-width:780px; padding:0 16px; line-height:1.5; }
  h1 { font-size:1.3rem; margin:0 0 2px; }
  .sub { color:var(--muted); font-size:.85rem; margin-bottom:16px; }
  .controls { margin:0 0 14px; }
  button { font:inherit; padding:5px 12px; margin-right:8px; border:1px solid #ccc;
           background:#fff; border-radius:6px; cursor:pointer; }
  button:hover { background:#f3f3f3; }
  .wrap { display:flex; gap:26px; flex-wrap:wrap; align-items:flex-start; }
  .left { flex:0 0 auto; }
  .hands { font-size:.85rem; color:var(--muted); margin-top:8px; min-height:24px; }
  .hands img { width:22px; vertical-align:middle; cursor:grab; -webkit-user-drag:none; user-select:none; }
  #board { touch-action:none; cursor:grab; }
  #board:active { cursor:grabbing; }

  .panel { flex:1 1 280px; min-width:260px; border:1px solid #e7e7ea; border-radius:10px;
           overflow:hidden; }
  .verdict { padding:12px 14px; font-weight:700; font-size:1.05rem; display:flex;
             align-items:baseline; gap:8px; border-left:5px solid var(--draw); }
  .verdict small { font-weight:500; color:var(--muted); font-size:.8rem; }
  .verdict.win  { background:var(--winbg);  border-left-color:var(--win); }
  .verdict.loss { background:var(--lossbg); border-left-color:var(--loss); }
  .verdict.draw { background:var(--drawbg); border-left-color:var(--draw); }
  .moves { max-height:460px; overflow-y:auto; }
  .grouphdr { font-size:.72rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
              color:#fff; padding:4px 14px; }
  .grouphdr.win  { background:var(--win); }
  .grouphdr.loss { background:var(--loss); }
  .grouphdr.draw { background:var(--draw); }
  .move { display:flex; align-items:center; justify-content:space-between; gap:10px;
          padding:7px 14px; border-bottom:1px solid #f1f1f3; cursor:pointer; font-size:.95rem; }
  .move:hover { background:#faf7ef; }
  .move.dead { cursor:default; opacity:.85; }
  .move .mv { font-family:ui-monospace,Menlo,monospace; }
  .badge { font-size:.78rem; font-weight:700; padding:2px 9px; border-radius:11px;
           white-space:nowrap; min-width:34px; text-align:center; }
  .badge.win  { background:var(--win);  color:#fff; }
  .badge.loss { background:var(--loss); color:#fff; }
  .badge.draw { background:#d7dade; color:#333; }
  .note { color:#9aa0a6; font-size:.78rem; margin-top:14px; }
</style>
</head>
<body>
  <h1>Dōbutsu Shōgi tablebase explorer</h1>
  <div class="sub">Every legal move with its result under perfect play. Click a move to follow it.</div>
  <div class="controls">
    <button id="reset">↺ Reset</button>
    <button id="back">← Back</button>
  </div>
  <div class="wrap">
    <div class="left">
      <svg id="board" width="300" height="384" viewBox="0 0 300 384"></svg>
      <div class="hands" id="hands"></div>
    </div>
    <div class="panel">
      <div class="verdict" id="verdict">…</div>
      <div class="moves" id="moves"></div>
    </div>
  </div>
  <div class="note">Backed by a complete endgame tablebase. Animal glyphs: Twemoji (CC-BY 4.0).</div>

<script>
const INITIAL = "S/gle/-c-/-C-/ELG/-";
const CELL = 84, MX = 24, MY = 24;
const PIECE = {C:"chick", G:"giraffe", E:"elephant", L:"lion", R:"hen"};
const FILES = ["a","b","c"];
let history = [INITIAL];
let hoverTo = null;
let curParsed = null;      // parsed current position (for board re-renders during drag)
let byBoard = {}, byDrop = {}; // drag-target -> move
let drag = null;           // {kind:'board',from} | {kind:'hand',piece}

function parsePos(pos) {
  const parts = pos.split("/");
  const cells = [], sente = [], gote = [];
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 3; c++) {
      const ch = parts[1 + r][c];
      if (ch === "-") continue;
      const owner = ch === ch.toUpperCase() ? "sente" : "gote";
      cells.push({ col: c, row: r, piece: ch.toUpperCase(), owner });
    }
  const hand = parts[5] || "-";
  if (hand !== "-") for (const ch of hand)
    (ch === ch.toUpperCase() ? sente : gote).push(ch.toUpperCase());
  return { side: parts[0], cells, sente, gote };
}

function destOf(mv) {
  const m = mv.match(/([abc])([1-4])$/);
  return m ? { col: FILES.indexOf(m[1]), row: parseInt(m[2], 10) - 1 } : null;
}

function renderBoard(parsed) {
  const occ = {};
  parsed.cells.forEach(c => occ[c.row * 3 + c.col] = c);
  let s = "";
  for (let f = 0; f < 3; f++)
    s += `<text x="${MX + f*CELL + CELL/2}" y="${MY-8}" font-size="14" text-anchor="middle" fill="#9a8a62" font-weight="600">${FILES[f].toUpperCase()}</text>`;
  for (let r = 0; r < 4; r++)
    s += `<text x="${MX-10}" y="${MY + r*CELL + CELL/2+5}" font-size="14" text-anchor="middle" fill="#9a8a62" font-weight="600">${r+1}</text>`;
  for (let r = 0; r < 4; r++)
    for (let c = 0; c < 3; c++) {
      const x = MX + c*CELL, y = MY + r*CELL;
      const hot = hoverTo && hoverTo.col === c && hoverTo.row === r;
      s += `<rect x="${x}" y="${y}" width="${CELL}" height="${CELL}" fill="var(--board)" stroke="${hot?'#d98a2b':'var(--line)'}" stroke-width="${hot?3:1}"/>`;
      const p = occ[r*3 + c];
      if (p) {
        const h = CELL*0.40, tx = x+CELL/2, ty = y+CELL/2;
        const fill = p.owner === "sente" ? "var(--ivory)" : "var(--slate)";
        const stroke = p.owner === "sente" ? "#6f5d33" : "#20252d";
        s += `<rect x="${tx-h}" y="${ty-h}" width="${2*h}" height="${2*h}" rx="${h*0.18}" fill="${fill}" stroke="${stroke}" stroke-width="2"/>`;
        const g = CELL*0.46;
        s += `<image href="/emoji/${PIECE[p.piece]}.svg" x="${tx-g/2}" y="${ty-g/2}" width="${g}" height="${g}"/>`;
      }
    }
  document.getElementById("board").innerHTML = s;
  const fmt = a => a.length ? a.map(p => `<img src="/emoji/${PIECE[p]}.svg" data-piece="${p}" draggable="false">`).join(" ") : "—";
  document.getElementById("hands").innerHTML =
    `in hand &nbsp; first player: ${fmt(parsed.sente)} &nbsp;&nbsp; second player: ${fmt(parsed.gote)}`;
}

function verdict(data) {
  const who = data.side === "S" ? "First player" : "Second player";
  const v = data.value, el = document.getElementById("verdict");
  el.className = "verdict " + v.result;
  if (v.result === "win") el.innerHTML = `${who} wins <small>in ${v.dtm} plies</small>`;
  else if (v.result === "loss") el.innerHTML = `${who} loses <small>in ${v.dtm} plies</small>`;
  else el.innerHTML = `Drawn <small>with perfect play</small>`;
}

function group(moves, kind) {
  let g = moves.filter(m => m.result === kind);
  if (kind === "win") g.sort((a,b) => a.dtm - b.dtm);   // fastest win first
  if (kind === "loss") g.sort((a,b) => b.dtm - a.dtm);  // slowest loss = best defense first
  return g;
}

function moveSquares(mv) {
  const piece = mv[0];
  if (mv[1] === "*") {
    const t = mv.slice(2, 4);
    return { from: null, piece, to: { col: FILES.indexOf(t[0]), row: +t[1] - 1 } };
  }
  const f = mv.slice(1, 3);
  const core = mv.endsWith("+") ? mv.slice(0, -1) : mv;
  const t = core.slice(-2);
  return { from: { col: FILES.indexOf(f[0]), row: +f[1] - 1 }, piece,
           to: { col: FILES.indexOf(t[0]), row: +t[1] - 1 } };
}

function render(data) {
  const parsed = parsePos(data.pos);
  curParsed = parsed;
  byBoard = {}; byDrop = {};
  for (const m of data.moves) {
    const sq = moveSquares(m.move);
    if (sq.from === null) byDrop[`${sq.piece}-${sq.to.col}${sq.to.row}`] = m;
    else byBoard[`${sq.from.col}${sq.from.row}-${sq.to.col}${sq.to.row}`] = m;
  }
  renderBoard(parsed);
  verdict(data);
  const box = document.getElementById("moves");
  box.innerHTML = "";
  for (const [kind, label] of [["win","Winning"],["draw","Drawing"],["loss","Losing"]]) {
    const moves = group(data.moves, kind);
    if (!moves.length) continue;
    const h = document.createElement("div");
    h.className = "grouphdr " + kind;
    h.textContent = `${label} · ${moves.length}`;
    box.appendChild(h);
    for (const m of moves) {
      const row = document.createElement("div");
      row.className = "move" + (m.to ? "" : " dead");
      const badge = kind === "draw" ? "draw" : (m.to ? m.dtm : `#${m.dtm}`);
      row.innerHTML = `<span class="mv">${m.move}</span><span class="badge ${kind}">${badge}</span>`;
      row.onmouseenter = () => { hoverTo = destOf(m.move); renderBoard(parsed); };
      row.onmouseleave = () => { hoverTo = null; renderBoard(parsed); };
      if (m.to) row.onclick = () => go(m.to, true);
      else row.title = "captures the lion / wins — game over";
      box.appendChild(row);
    }
  }
}

async function go(pos, push) {
  const data = await (await fetch("/api?pos=" + encodeURIComponent(pos))).json();
  if (data.error) { alert(data.error); return; }
  if (push) history.push(pos);
  hoverTo = null;
  render(data);
}

// ---- drag to move (board) / drop from hand ----
function squareFromEvent(e) {
  const r = document.getElementById("board").getBoundingClientRect();
  const x = (e.clientX - r.left) * (300 / r.width);
  const y = (e.clientY - r.top) * (384 / r.height);
  const col = Math.floor((x - MX) / CELL), row = Math.floor((y - MY) / CELL);
  return (col < 0 || col > 2 || row < 0 || row > 3) ? null : { col, row };
}
function tryMove(d, dest) {
  const m = d.kind === "board"
    ? byBoard[`${d.from.col}${d.from.row}-${dest.col}${dest.row}`]
    : byDrop[`${d.piece}-${dest.col}${dest.row}`];
  if (!m) return;
  if (m.to) go(m.to, true);
  else alert("That move wins — the lion is captured (or a Try).");
}
document.getElementById("board").addEventListener("pointerdown", e => {
  const sq = squareFromEvent(e);
  if (!sq || !curParsed || !curParsed.cells.some(c => c.col === sq.col && c.row === sq.row)) return;
  e.preventDefault();
  drag = { kind: "board", from: sq };
});
document.getElementById("hands").addEventListener("pointerdown", e => {
  if (e.target.tagName === "IMG" && e.target.dataset.piece) {
    e.preventDefault();
    drag = { kind: "hand", piece: e.target.dataset.piece };
  }
});
window.addEventListener("pointermove", e => {
  if (!drag) return;
  const sq = squareFromEvent(e);
  const same = (hoverTo && sq && hoverTo.col === sq.col && hoverTo.row === sq.row) || (!hoverTo && !sq);
  if (same) return;
  hoverTo = sq;
  if (curParsed) renderBoard(curParsed);
});
window.addEventListener("pointerup", e => {
  if (!drag) return;
  const dest = squareFromEvent(e), d = drag;
  drag = null; hoverTo = null;
  if (curParsed) renderBoard(curParsed);
  if (dest) tryMove(d, dest);
});
window.addEventListener("pointercancel", () => {
  if (!drag) return;
  drag = null; hoverTo = null;
  if (curParsed) renderBoard(curParsed);
});

document.getElementById("reset").onclick = () => { history = [INITIAL]; go(INITIAL, false); };
document.getElementById("back").onclick = () => {
  if (history.length > 1) { history.pop(); go(history[history.length - 1], false); }
};
go(INITIAL, false);
</script>
</body>
</html>
